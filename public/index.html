<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>日経平均シグナル</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="viz-root">
  <header class="app-header">
    <h1>日経平均シグナル</h1>
    <p class="updated" id="updated">読み込み中…</p>
  </header>

  <section class="card hero-card" id="heroCard">
    <div class="hero-label">本日のシグナル</div>
    <div class="hero-figure-row">
      <span class="hero-arrow" id="heroArrow">●</span>
      <span class="hero-figure" id="heroFigure">--</span>
    </div>
    <div class="hero-sub" id="heroLabel">読み込み中</div>
    <div class="price-line" id="priceLine"></div>
  </section>

  <section class="card meter-card">
    <div class="card-title">総合スコア(-100〜+100)</div>
    <div class="meter-track" id="meterTrack">
      <div class="meter-center-line"></div>
      <div class="meter-fill" id="meterFill"></div>
      <div class="meter-marker" id="meterMarker"></div>
    </div>
    <div class="meter-scale">
      <span class="down-text">弱気 -100</span>
      <span class="muted-text">0</span>
      <span class="up-text">+100 強気</span>
    </div>
  </section>

  <section class="card chart-card">
    <div class="card-title">日経平均と過去1ヶ月のシグナル</div>
    <div class="sparkline-wrap" id="historyWrap">
      <svg id="historyChart" width="100%" height="200" aria-label="日経平均の推移とシグナルの状態"></svg>
      <div class="chart-tooltip" id="historyTooltip" hidden></div>
    </div>
    <div class="line-legend">
      <span class="line-legend-item"><span class="line-key line-key-solid"></span>日経平均(終値)</span>
      <span class="line-legend-item"><span class="line-key line-key-dashed"></span>シグナルスコア(目安)</span>
    </div>
    <div class="band-legend">
      <span class="band-legend-item"><span class="band-chip" style="background:var(--up-wash-strong)"></span>強気</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--up-wash-weak)"></span>やや強気</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--neutral-mid)"></span>中立</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--down-wash-weak)"></span>やや弱気</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--down-wash-strong)"></span>弱気</span>
    </div>
  </section>

  <section class="card breakdown-card">
    <div class="card-title">シグナルの内訳</div>
    <div id="breakdownList" class="breakdown-list"></div>
  </section>

  <section class="card crash-card">
    <div class="card-title">過去の暴落時のシグナル(前後7営業日)</div>
    <select id="crashSelect" class="crash-select">
      <option value="2024-08-05">2024/8/5 令和のブラックマンデー(-12.4%)</option>
      <option value="2025-04-07">2025/4/7 トランプ関税ショック(-7.8%)</option>
      <option value="2020-03-13">2020/3/13 コロナショック(-6.1%)</option>
      <option value="2016-06-24">2016/6/24 Brexitショック(-7.9%)</option>
      <option value="2011-03-15">2011/3/15 東日本大震災(-10.6%)</option>
      <option value="2008-10-16">2008/10/16 リーマンショック(-11.4%)</option>
      <option value="2001-09-12">2001/9/12 同時多発テロ(-6.6%)</option>
      <option value="2000-04-17">2000/4/17 ITバブル崩壊(-7.0%)</option>
    </select>
    <div class="sparkline-wrap" id="crashChartWrap">
      <svg id="crashChart" width="100%" height="200" aria-label="暴落前後の日経平均とシグナルの推移"></svg>
      <div class="chart-tooltip" id="crashTooltip" hidden></div>
    </div>
    <div class="line-legend">
      <span class="line-legend-item"><span class="line-key line-key-solid"></span>日経平均(終値)</span>
      <span class="line-legend-item"><span class="line-key line-key-dashed"></span>シグナルスコア(目安)</span>
    </div>
    <div class="band-legend">
      <span class="band-legend-item"><span class="band-chip" style="background:var(--up-wash-strong)"></span>強気</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--up-wash-weak)"></span>やや強気</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--neutral-mid)"></span>中立</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--down-wash-weak)"></span>やや弱気</span>
      <span class="band-legend-item"><span class="band-chip" style="background:var(--down-wash-strong)"></span>弱気</span>
    </div>
    <p class="crash-status" id="crashStatus"></p>
    <div id="crashTable" class="crash-table"></div>
  </section>

  <footer class="app-footer">
    <button id="refreshBtn" class="refresh-btn" type="button">更新する</button>
    <p class="disclaimer">
      本アプリは移動平均・RSI・MACD・米国市場・為替などの技術的な指標から機械的に算出した
      簡易シグナルであり、投資助言ではありません。投資判断はご自身の責任で行ってください。
    </p>
  </footer>
</div>
<script src="/app.js"></script>
</body>
</html>
